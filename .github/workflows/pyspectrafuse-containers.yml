name: pyspectrafuse Containers Build and Sync

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to registry'
        required: false
        default: true
        type: 'boolean'

jobs:
  build-pyspectrafuse:
    name: Build and Push pyspectrafuse Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      SINGULARITY_TMPDIR: /tmp/singularity-tmp
      SINGULARITY_CACHEDIR: /tmp/singularity-cache
      SINGULARITY_LIBRARYDIR: /tmp/singularity-lib

    steps:
    - name: Free up disk space before build
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        docker system prune -af || true
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Extract version from pyproject.toml
      id: version
      run: |
        VERSION=$(grep '^version = ' pyproject.toml | cut -d'"' -f2)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

    - name: Build and Push pyspectrafuse image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: ${{ (github.event.inputs.push_images == true || github.event.inputs.push_images == '') && (github.event_name != 'pull_request') }}
        tags: |
          ghcr.io/bigbio/pyspectrafuse:latest
          ghcr.io/bigbio/pyspectrafuse:${{ steps.version.outputs.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=min
        build-args: |
          BUILDKIT_INLINE_CACHE=1
        provenance: false
        platforms: linux/amd64

    - name: Test container functionality
      run: |
        echo "Testing CLI..."
        docker run --rm ghcr.io/bigbio/pyspectrafuse:${{ steps.version.outputs.VERSION }} --help
        echo "Testing Python imports..."
        docker run --rm --entrypoint python ghcr.io/bigbio/pyspectrafuse:${{ steps.version.outputs.VERSION }} -c "from pyspectrafuse.pyspectrafuse import main; print('CLI import OK')"
        echo "Testing dat conversion import..."
        docker run --rm --entrypoint python ghcr.io/bigbio/pyspectrafuse:${{ steps.version.outputs.VERSION }} -c "from pyspectrafuse.maracluster_dat import parquet_to_dat; print('dat conversion import OK')"
        echo "All container tests passed!"

    - name: Free up disk space after build
      run: |
        docker image rm ghcr.io/bigbio/pyspectrafuse:latest || true
        docker system prune -af || true

    - name: Set up Singularity
      if: ${{ (github.event.inputs.push_images == true || github.event.inputs.push_images == '') && (github.event_name != 'pull_request') }}
      uses: eWaterCycle/setup-singularity@v7
      with:
        singularity-version: 3.8.7

    - name: Prepare Singularity temp dir
      if: ${{ (github.event.inputs.push_images == true || github.event.inputs.push_images == '') && (github.event_name != 'pull_request') }}
      run: mkdir -p /tmp/singularity-tmp /tmp/singularity-cache /tmp/singularity-lib

    - name: Convert Docker image to Singularity
      if: ${{ (github.event.inputs.push_images == true || github.event.inputs.push_images == '') && (github.event_name != 'pull_request') }}
      run: |
        singularity build --disable-cache pyspectrafuse.sif docker://ghcr.io/bigbio/pyspectrafuse:latest
        ls -la pyspectrafuse.sif

    - name: Login and Deploy Container
      if: (github.event_name != 'pull_request')
      run: |
        echo ${{ secrets.GHCR_TOKEN }} | singularity remote login -u ${{ secrets.GHCR_USERNAME }} --password-stdin oras://ghcr.io
        singularity push pyspectrafuse.sif oras://ghcr.io/bigbio/pyspectrafuse-sif:${{ steps.version.outputs.VERSION }}
        if [[ "${{ github.event_name }}" == "release" || "${{ github.ref }}" == "refs/heads/master" ]]; then
          singularity push pyspectrafuse.sif oras://ghcr.io/bigbio/pyspectrafuse-sif:latest
        fi
